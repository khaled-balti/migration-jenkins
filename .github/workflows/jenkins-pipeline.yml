name: jenkins-pipeline
on:
  push:
    branches:
    - master
env:
  DOCKER_IMAGE: my-web-app:latest
  DOCKER_HUB_IMAGE: khaled122/my-web-app:latest
  SONARQUBE: sonarqube
#   # This item has no matching transformer
#   SONAR_TOKEN:
#   # This item has no matching transformer
#   DOCKER_HUB_CRED:
  KUBECONFIG: "/var/jenkins_home/kube/config"
jobs:
  Checkout:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: checkout
      uses: actions/checkout@v4.1.0
      with:
        repository: khaled-balti/jenkins-docker-sonarqube
  SonarQube_Analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: Checkout
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
#     # This item has no matching transformer
#     - withSonarQubeEnv:
#         isLiteral: false
#         value: '"${{ env.SONARQUBE }}"'
  Build_Docker_Image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: SonarQube_Analysis
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: sh
      shell: bash
      run: '"docker build -t ${{ env.DOCKER_IMAGE }} ."'
  Push_Docker_Image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: Build_Docker_Image
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
#     # 'script' was not transformed because there is no suitable equivalent in GitHub Actions
#     - name: script
#       arguments:
#       - key: scriptBlock
#         value:
#           isLiteral: true
#           value: |-
#             docker.withRegistry('https://index.docker.io/v1/', 'DOCKER_HUB_CRED') {
#                                     sh """
#                                         docker tag ${{ env.DOCKER_IMAGE }} ${{ env.DOCKER_HUB_IMAGE }}
#                                         docker push ${{ env.DOCKER_HUB_IMAGE }}
#                                     """
#                                 }
  Deploy_to_Kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: Push_Docker_Image
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: sh
      shell: bash
      run: |-
        kubectl --kubeconfig=/var/jenkins_home/.kube/config apply --validate=false -f k8s/deployment.yml
        kubectl --kubeconfig=/var/jenkins_home/.kube/config apply --validate=false -f k8s/service.yml
